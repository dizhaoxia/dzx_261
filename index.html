<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D 粒子文字生成器</title>
    <link rel="stylesheet" href="./css/style.css">
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <div id="canvas-container"></div>
    
    <div class="control-panel">
        <h1 class="panel-title">3D 粒子文字生成器</h1>
        
        <div class="control-group">
            <label for="text-input">输入文字</label>
            <input type="text" id="text-input" value="HELLO" maxlength="20" placeholder="输入文字...">
        </div>
        
        <div class="control-group">
            <label for="particle-size">粒子大小: <span id="particle-size-value">1.0</span></label>
            <input type="range" id="particle-size" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <label for="particle-color">粒子颜色</label>
            <input type="color" id="particle-color" value="#00ffff">
        </div>
        
        <div class="control-group">
            <label for="font-size">文字精度: <span id="font-size-value">100</span></label>
            <input type="range" id="font-size" min="50" max="200" step="10" value="100">
        </div>
        
        <div class="control-group">
            <div class="checkbox-row">
                <input type="checkbox" id="auto-rotate" checked>
                <label for="auto-rotate">自动旋转</label>
            </div>
        </div>
        
        <div class="control-group" id="rotate-speed-group">
            <label for="rotate-speed">旋转速度: <span id="rotate-speed-value">1.0</span></label>
            <input type="range" id="rotate-speed" min="0.1" max="5.0" step="0.1" value="1.0">
        </div>
        
        <div class="control-group">
            <button id="screenshot-btn">截图保存</button>
        </div>
        
        <div class="control-tips">
            <p>🖱️ 左键拖拽：旋转视角</p>
            <p>🖱️ 右键拖拽：平移视角</p>
            <p>🖱️ 滚轮：缩放</p>
        </div>
    </div>
    
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>加载中...</p>
    </div>
    
    <script type="module" src="./js/main.js"></script>
</body>
</html>
